# podman-compose creates a pod per project by default; pods own the network
# namespace, which conflicts with per-container network_mode: pasta
x-podman:
  in_pod: false

x-service: &service
  image: docker.io/nikicat/tg-echo-service
  network_mode: pasta

x-tools: &tools
  image: docker.io/nikicat/tg-echo-service-tools
  volumes:
    - ./:/out
  profiles:
    - tools

services:
  auth:
    <<: *service
    environment:
      - API_ID
      - API_HASH
    volumes:
      - ./tdlib_db:/app/tdlib_db
    stdin_open: true
    tty: true
    profiles:
      - auth

  prompt:
    <<: *tools
    network_mode: none
    command: ["prompt"]

  glados-prompt:
    <<: *tools
    network_mode: pasta
    command: ["glados-prompt"]

  call-service:
    <<: *service
    environment:
      - API_ID
      - API_HASH
      - ECHO_DELAY
    volumes:
      - ./tdlib_db:/app/tdlib_db
      - ./recordings:/app/recordings
      - ./prompt.mp3:/app/prompt.mp3:ro
    restart: unless-stopped

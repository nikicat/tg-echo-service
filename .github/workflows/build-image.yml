name: build-image

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
  workflow_dispatch:

# This build is heavy (TDLib + tgcalls + WebRTC from source); cancel runs
# superseded by a newer commit on the same ref.
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  # GHCR image, derived from the repo (e.g. ghcr.io/nikicat/tg-echo-service).
  # Assumes the repo owner/name are lowercase, as GHCR requires.
  IMAGE: ghcr.io/${{ github.repository }}
  # Published tag: the git tag name on a tag push, otherwise "latest" (master).
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}

jobs:
  # Build each architecture natively on its own runner (emulation is not viable
  # for a from-source WebRTC build). The Ubuntu base is multi-arch, so both legs
  # share one Containerfile with no per-arch base.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Pull request / manual runs: build only, read from cache, never push.
      - name: Build image
        if: github.event_name != 'push'
        run: |
          make image \
            IMAGE="$IMAGE" TAG="${{ matrix.arch }}" \
            IMAGE_BUILD_ARGS="--layers --cache-from $IMAGE/buildcache-${{ matrix.arch }}"

      # Push events (master branch or a git tag): build, populate the per-arch
      # cache, and push the per-arch tag <VERSION>-<arch> (image + tools image).
      # The manifest job stitches them into the multi-arch :<VERSION>.
      - name: Build and push per-arch image
        if: github.event_name == 'push'
        run: |
          make push \
            IMAGE="$IMAGE" TAG="$VERSION-${{ matrix.arch }}" \
            IMAGE_BUILD_ARGS="--layers --cache-from $IMAGE/buildcache-${{ matrix.arch }} --cache-to $IMAGE/buildcache-${{ matrix.arch }}"

  # Combine the per-arch tags into the multi-arch :<VERSION> manifest for the
  # image and the tools image. Manifests are arch-agnostic, so this runs on amd64.
  manifest:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create and push multi-arch manifests
        run: |
          for repo in "$IMAGE" "$IMAGE-tools"; do
            podman manifest create "$repo:$VERSION"
            podman manifest add "$repo:$VERSION" "$repo:$VERSION-amd64"
            podman manifest add "$repo:$VERSION" "$repo:$VERSION-arm64"
            podman manifest push --all "$repo:$VERSION" "docker://$repo:$VERSION"
            podman manifest rm "$repo:$VERSION"
          done
